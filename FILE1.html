<!DOCTYPE html>
<html>
<head>
    <title>AI Image Generator</title>
</head>
<body>

<h1>AI Image Generator</h1>

<form action="/generate" method="POST">
    <input
        type="text"
        name="prompt"
        placeholder="Enter image prompt"
        required
        style="width:400px;height:40px;"
    >

    <button type="submit">
        Generate Image
    </button>
</form>

</body>
</html>
